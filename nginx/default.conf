server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  location = /api {
    return 307 /api/;
  }

  location ^~ /api/ {
    proxy_pass http://fastapi:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # Rewrite Location headers from upstream so they point back under /api on the public host.
    # - absolute redirects like http://fastapi:8000/... -> /api/...
    proxy_redirect http://fastapi:8000/ /api/;
    # - relative redirects starting with /... should be rewritten to /api/...
    proxy_redirect ~^/ /api/;
  }

  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}